name: Build and Release VTM

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  VTM_VERSION: VTM-20.2
  VTM_URL: https://vcgit.hhi.fraunhofer.de/jvet/VVCSoftware_VTM/-/archive/VTM-20.2/VVCSoftware_VTM-VTM-20.2.zip

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake unzip wget zip

      - name: Download source
        run: |
          wget -O vtm.zip "$VTM_URL"
          unzip -q vtm.zip
          mv VVCSoftware_VTM-${VTM_VERSION} VTM

      - name: Configure
        run: |
          mkdir -p VTM/build
          cd VTM/build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd VTM/build
          make -j"$(nproc)"

      - name: Show executables
        run: |
          find VTM/bin -type f -executable

      - name: Package executables
        run: |
          # Compress all files inside the bin folder into a single zip archive
          zip -j vtm-20.2-ubuntu-22.04.zip VTM/bin/*

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vtm-20.2-v1
          name: "VTM 20.2 Binaries"
          files: vtm-20.2-ubuntu-22.04.zip
          # If the release exists, this will add/update the file in it.
