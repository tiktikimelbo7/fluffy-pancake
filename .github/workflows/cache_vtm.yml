name: Cache VTM

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  VTM_VERSION: VTM-20.2
  VTM_URL: https://vcgit.hhi.fraunhofer.de/jvet/VVCSoftware_VTM/-/archive/VTM-20.2/VVCSoftware_VTM-VTM-20.2.zip

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake unzip

      - name: Download source
        run: |
          wget -O vtm.zip "${VTM_URL}"
          unzip -q vtm.zip
          mv VVCSoftware_VTM-${VTM_VERSION} VTM

      - name: Restore app cache
        id: app-cache
        uses: actions/cache@v4
        with:
          path: VTM/bin  # FIXED: VTM outputs executables to the root bin/ folder
          key: linux-vtm-apps-${{ env.VTM_VERSION }}

      - name: Configure
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p VTM/build
          cd VTM/build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build
        if: steps.app-cache.outputs.cache-hit != 'true'
        run: |
          cd VTM/build
          make -j$(nproc)

      - name: Show executables
        run: |
          # FIXED: Because we used CMake, binaries are directly in VTM/bin 
          # rather than the umake/... directory structure.
          find VTM/bin -type f -executable

      - name: Upload VTM Apps
        uses: actions/upload-artifact@v4
        with:
          name: VTM-20.2-Linux
          path: VTM/bin/* # FIXED: Uploading from the correct bin/ folder
