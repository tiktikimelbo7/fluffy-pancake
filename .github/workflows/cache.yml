name: Cache Dataset (MEGA CMD Manual Install)

on:
  workflow_dispatch:

jobs:
  cache-dataset:
    runs-on: ubuntu-22.04

    steps:
    # ----------------------------------------
    # Install dependencies
    # ----------------------------------------
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y unzip wget

    # ----------------------------------------
    # Install mega-cmd manually (.deb)
    # ----------------------------------------
    - name: Install mega-cmd
      run: |
        wget https://mega.nz/linux/repo/xUbuntu_22.04/amd64/mega-cmd_1.6.3-1.1_amd64.deb
        sudo apt install -y ./mega-cmd_1.6.3-1.1_amd64.deb

        # verify
        mega-version || echo "mega-cmd install failed"

    # ----------------------------------------
    # Restore cache
    # ----------------------------------------
    - name: Restore dataset cache
      uses: actions/cache@v4
      with:
        path: dataset
        key: dataset-mega-v1-${{ runner.os }}

    # ----------------------------------------
    # Download dataset using mega-cmd
    # ----------------------------------------
    - name: Download dataset (mega-cmd)
      env:
        MEGA_USER: ${{ secrets.MEGA_USER }}
        MEGA_PASS: ${{ secrets.MEGA_PASS }}
      run: |
        if [ ! -d dataset ]; then
          echo "📥 Downloading dataset via mega-cmd"

          mkdir -p dataset_zip

          mega-login "$MEGA_USER" "$MEGA_PASS"

          # Retry loop
          for i in {1..5}; do
            echo "Attempt $i..."

            mega-get "https://mega.nz/file/kIdhyATA#QjiOI1xFOZjRWpRUKSSPFRWzBx2WpUQ1PLfezxmt740" dataset_zip/ && break

            echo "⚠️ Failed attempt $i, retrying in 2 minutes..."
            sleep 120
          done

          mega-logout

          mkdir -p dataset
          unzip -o dataset_zip/*.zip -d dataset

        else
          echo "✅ Dataset restored from cache"
        fi
