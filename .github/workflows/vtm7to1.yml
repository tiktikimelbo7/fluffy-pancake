name: VTM LowDelay → Inter4K PNG Dataset → Google Drive

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        VIDEO_ID: [12]

    env:
      WIDTH: 3840
      HEIGHT: 2160
      FPS: 60
      STRIDE: 60
      QP: 37
      VTM_URL: https://vcgit.hhi.fraunhofer.de/jvet/VVCSoftware_VTM/-/archive/VTM-20.2/VVCSoftware_VTM-VTM-20.2.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake unzip wget curl megatools xz-utils

      - name: Download FFmpeg
        run: |
          mkdir -p ffmpeg_bin
          cd ffmpeg_bin
          wget -q https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz

      - name: Set FFmpeg paths
        run: |
          echo "FFMPEG=$GITHUB_WORKSPACE/ffmpeg_bin/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg" >> $GITHUB_ENV
          echo "FFPROBE=$GITHUB_WORKSPACE/ffmpeg_bin/ffmpeg-master-latest-linux64-gpl/bin/ffprobe" >> $GITHUB_ENV
          echo "INPUT=dataset/${{ matrix.VIDEO_ID }}.mp4" >> $GITHUB_ENV

      - name: Cache VTM
        id: cache-vtm
        uses: actions/cache@v4
        with:
          path: VTM
          key: vtm-20.2-linux

      - name: Download & Build VTM
        if: steps.cache-vtm.outputs.cache-hit != 'true'
        run: |
          wget -q -O vtm.zip "$VTM_URL"
          unzip -q vtm.zip
          mv VVCSoftware_VTM-VTM-20.2 VTM
          mkdir -p VTM/build
          cd VTM/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Locate EncoderApp
        run: |
          ENCODER=$(find $GITHUB_WORKSPACE/VTM -type f \( -name EncoderAppStatic -o -name EncoderApp \) | head -n1)
          echo "ENCODER=$ENCODER" >> $GITHUB_ENV
          echo "Using $ENCODER"

      - name: Cache dataset
        uses: actions/cache@v4
        with:
          path: dataset
          key: dataset-mega-v1-${{ runner.os }}

      - name: Download dataset
        run: |
          if [ ! -d dataset ]; then
            mkdir -p dataset_zip
            megadl "https://mega.nz/file/kIdhyATA#QjiOI1xFOZjRWpRUKSSPFRWzBx2WpUQ1PLfezxmt740" --path dataset_zip
            mkdir -p dataset
            unzip -o dataset_zip/*.zip -d dataset
          fi

      - name: Detect total frames
        run: |
          TOTAL_FRAMES=$($FFPROBE -v error -select_streams v:0 -count_frames -show_entries stream=nb_read_frames -of csv=p=0 "$INPUT")
          echo "TOTAL_FRAMES=$TOTAL_FRAMES" >> $GITHUB_ENV

      - name: Extract, encode and create PNG dataset
        run: |
          set -euo pipefail

          mkdir -p Inter4K_png/Raw/Input
          mkdir -p Inter4K_png/Raw/Output
          mkdir -p yuv_segments encoded_segments

          for ((START=1; START+7<=TOTAL_FRAMES; START+=STRIDE)); do
            TARGET=$((START+7))
            MIDDLE=$((START+3))
            printf -v TARGET_PAD "%03d" "$TARGET"
            printf -v MIDDLE_PAD "%03d" "$MIDDLE"

            FIRST=$((START-1))
            LAST=$((START+6))

            $FFMPEG -v error -y \
              -i "$INPUT" \
              -vf "select='between(n\,${FIRST}\,${LAST})',setpts=N/FRAME_RATE/TB" \
              -pix_fmt yuv420p -s ${WIDTH}x${HEIGHT} -r ${FPS} \
              -f rawvideo yuv_segments/seg_${START}.yuv

            $ENCODER \
              -c $GITHUB_WORKSPACE/VTM/cfg/encoder_lowdelay_P_vtm.cfg \
              -i yuv_segments/seg_${START}.yuv \
              -b encoded_segments/seg_${START}.bin \
              -o encoded_segments/seg_${START}_rec.yuv \
              -wdt ${WIDTH} \
              -hgt ${HEIGHT} \
              -fr ${FPS} \
              -f 7 \
              -q ${QP}

            for OFFSET in 0 1 2 3 4 5 6; do
              FRAME=$((START+OFFSET))
              INPUTNUM=$((OFFSET+1))
              printf -v FRAMEPAD "%03d" "$FRAME"

              $FFMPEG -v error -y \
                -f rawvideo -pix_fmt yuv420p \
                -s ${WIDTH}x${HEIGHT} \
                -framerate ${FPS} \
                -i encoded_segments/seg_${START}_rec.yuv \
                -vf "select=eq(n\\,$OFFSET)" \
                -frames:v 1 \
                Inter4K_png/Raw/Input/Inter4K_vid_${{ matrix.VIDEO_ID }}_f${FRAMEPAD}_in${INPUTNUM}.png
            done

            $FFMPEG -v error -y -i "$INPUT" \
              -vf "select=eq(n\\,$((TARGET-1)))" \
              -frames:v 1 \
              Inter4K_png/Raw/Output/Inter4K_vid_${{ matrix.VIDEO_ID }}_f${TARGET_PAD}_out.png

            $FFMPEG -v error -y -i "$INPUT" \
              -vf "select=eq(n\\,$((MIDDLE-1)))" \
              -frames:v 1 \
              Inter4K_png/Raw/Output/Inter4K_vid_${{ matrix.VIDEO_ID }}_f${MIDDLE_PAD}_out.png

            rm -f yuv_segments/seg_${START}.yuv
            rm -f encoded_segments/seg_${START}.*
          done

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Upload dataset
        run: |
          rclone copy Inter4K_png dataset:sevtone_vtm_37/Inter4K_png --progress
