name: Upload Cached Dataset to Google Drive

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-22.04

    steps:
      - name: Restore dataset cache
        uses: actions/cache@v4
        with:
          path: dataset
          key: dataset-mega-v1-${{ runner.os }}

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG_BASE64 }}" | base64 -d > ~/.config/rclone/rclone.conf

      - name: Verify restored dataset
        run: |
          ls -lah
          du -sh dataset
          find dataset | head -20

      - name: Upload dataset to Google Drive
        run: |
          rclone copy dataset dataset:sevtone_51/dataset --progress
